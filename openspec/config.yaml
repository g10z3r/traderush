schema: spec-driven

context: |
  Язык OpenSpec-артефактов: русский.
  Все OpenSpec-артефакты для этого проекта должны создаваться на русском языке,
  если пользователь явно не попросил другой язык.
  Технические идентификаторы, имена файлов, имена классов, методы, команды,
  capability names и обязательные служебные OpenSpec-маркеры можно оставлять на английском.

rules:
  proposal:
    - Пиши proposal на русском языке.
    - Сохраняй технические идентификаторы, имена файлов, классов, методов и команд без перевода.
  design:
    - Пиши design на русском языке.
    - Сохраняй технические идентификаторы, имена файлов, классов, методов и команд без перевода.
  specs:
    - Пиши текст требований, сценариев и описаний на русском языке.
    - Сохраняй служебные OpenSpec-заголовки и маркеры в формате, который ожидает OpenSpec: `## ADDED Requirements`, `## MODIFIED Requirements`, `## REMOVED Requirements`, `## RENAMED Requirements`, `### Requirement:`, `#### Scenario:`.
    - В сценариях сохраняй маркеры `**WHEN**`, `**THEN**` и `**AND**`, но пиши условия и ожидаемые результаты на русском языке.
    - Используй kebab-case для имён capabilities и путей specs, если существующие соглашения проекта не требуют другого.
  tasks:
    - Пиши задачи на русском языке.
    - Сохраняй checkbox-формат `- [ ] X.Y ...`, чтобы apply-фаза могла отслеживать прогресс.
